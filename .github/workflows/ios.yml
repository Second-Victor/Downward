name: iOS Build and Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Downward Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project
        run: xcodebuild -list -project Downward.xcodeproj

      - name: Run tests
        run: |
          xcodebuild test \
            -project Downward.xcodeproj \
            -scheme Downward \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -derivedDataPath "$RUNNER_TEMP/DownwardDerivedData"
